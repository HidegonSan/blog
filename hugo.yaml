baseURL: "https://hidegonsan.github.io/blog/"
canonifyUrls: true # サブディレクトリを使用する系ならこれが必要らしい

buildDrafts: false
buildFuture: false
buildExpired: false

title: ""
author: ""
copyright: ""

theme: "PaperMod"
pagination:
  pagerSize: 10
summaryLength: 140

defaultContentLanguage: "ja"
languageCode: "ja-JP"
hasCJKLanguage: true
enableEmoji: true

disableHugoGeneratorInject: true
enableRobotsTXT: true

enableGitInfo: true
rssLimit: 20

minify:
  disableXML: true
  minifyOutput: true


taxonomies:
  category: "categories"
  tag: "tags"


# Thanks: https://shunyaueta.com/posts/2021-10-06/
frontmatter:
  lastmod: ["lastmod", ":git"]


params:
  title: ""
  description: "This blog is not working"
  keywords: []
  classification: []
  author: ""
  images: ["img/ogp.png"]
  DateFormat: "2006-01-02"
  locale: "ja_JP"

  defaultTheme: "auto"
  disableThemeToggle: false

  env: "development"
  ShowReadingTime: false
  ShowShareButtons: false
  hideAuthor: true
  ShowRelatedContent: true
  ShowToc: true
  TocOpen: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  # UseHugoToc: false
  # disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hideMeta: false
  # hideSummary: false

  assets:
    # disableFingerprinting: true
    favicon: "favicons/favicon.ico"
    favicon16x16: "favicons/favicon-16x16.png"
    favicon32x32: "favicons/favicon-32x32.png"
    apple_touch_icon: "favicons/apple-touch-icon.png"
    safari_pinned_tab: "favicons/maskable_icon.png"

  label:
    text: "🏕️ "
    # icon: /apple-touch-icon.png
    # iconHeight: 35

  # ホーム
  homeInfoParams:
    Title: "🏕️"
    Content: "This blog is not working"

  # 投稿のサムネイル
  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  # 検索設定
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]


menu:
  main: [
    {
      identifier: "about",
      name: "About",
      url: "pages/about/",
      weight: 1
    },
    {
      identifier: "tools",
      name: "Tools",
      url: "pages/tools/",
      weight: 2
    },
    {
      identifier: "posts",
      name: "Posts",
      url: "posts/",
      weight: 3
    },
    {
      identifier: "tags",
      name: "Tags",
      url: "tags/",
      weight: 4
    },
    {
      identifier: "search",
      name: " 🔍",
      url: "search/",
      weight: 5
    }
  ]


# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true


markup:
  highlight:
    # anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    noClasses: false
    # style: "monokai" # https://xyproto.github.io/splash/docs/
  goldmark:
    renderer:
      unsafe: false

# 検索に必要
outputs:
  home: ["HTML", "RSS", "JSON"]


# プライバシ
privacy:
  vimeo:
    disabled: false
    simple: true

  x:
    disabled: false
    enableDNT: true
    simple: true

  instagram:
    disabled: false
    simple: true

  youtube:
    disabled: false
    privacyEnhanced: true


services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true
